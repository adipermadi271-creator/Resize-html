name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Buat folder sementara untuk memancing file proyek keluar
          cordova create temp_app com.belajarkode.resizer ResizerApp
          
          # 2. Masuk ke folder sementara
          cd temp_app
          
          # 3. Salin file asli kamu (www dan config) dari folder root ke sini
          cp -r ../www/* www/
          cp ../config.xml config.xml
          
          # 4. Tambah platform & prepare (Ini yang menciptakan gradlew)
          cordova platform add android@12.0.0
          cordova prepare android
          
          # 5. Pastikan file gradlew ada sebelum di-chmod
          if [ -f "platforms/android/gradlew" ]; then
            chmod +x platforms/android/gradlew
            
            # 6. Jalankan build menggunakan Java 17
            export JAVA_HOME=$JAVA_HOME_17_X64
            ./platforms/android/gradlew assembleDebug -p platforms/android
            
            # 7. Kirim hasilnya ke folder output di luar
            mkdir -p ../output
            cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../output/resizer-android13.apk
          else
            echo "Error: gradlew tidak ditemukan!"
            exit 1
          fi

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

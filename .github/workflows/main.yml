name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11' # Kembali ke 11 karena paling cocok dengan Gradle 7

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Tambahkan platform
          cordova platform add android@12.0.0
          
          # 2. Paksa download Gradle 7.6 secara manual ke folder proyek
          wget https://services.gradle.org/distributions/gradle-7.6-bin.zip -P /tmp
          sudo unzip -d /opt/gradle /tmp/gradle-7.6-bin.zip
          export PATH=/opt/gradle/gradle-7.6/bin:$PATH
          
          # 3. Kunci agar Cordova pakai Gradle yang baru kita download (BUKAN punya GitHub)
          export CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL="https://services.gradle.org/distributions/gradle-7.6-bin.zip"
          
          # 4. Jalankan build dengan perintah khusus agar tidak pakai 'wrapper' GitHub
          export JAVA_HOME=$JAVA_HOME_11_X64
          cordova build android --debug --device --verbose --no-telemetry -- --gradleArg=-Pandroid.useAndroidX=true
          
          # 5. Ambil hasil APK
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/resizer-android13.apk \;

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

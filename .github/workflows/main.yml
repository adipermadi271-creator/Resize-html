      - name: Build Android APK
        run: |
          # 1. Buat proyek
          cordova create my_app com.belajarkode.resizer ResizerApp
          
          # 2. Salin file (pastikan folder www dan config.xml ada di root repo kamu)
          cp -r www/* my_app/www/
          cp config.xml my_app/config.xml
          
          # 3. Jalankan rangkaian perintah di dalam folder my_app tanpa putus
          cd my_app && \
          cordova platform add android@12.0.0 && \
          cordova prepare android && \
          chmod +x platforms/android/gradlew && \
          export JAVA_HOME=$JAVA_HOME_11_X64 && \
          cordova build android --debug --device && \
          cd .. && \
          mkdir -p output && \
          cp my_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk output/resizer-android13.apk

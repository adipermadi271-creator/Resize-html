name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Tambahkan platform
          cordova platform add android@12.0.0
          
          # 2. OPERASI BEDAH: Kita perbaiki XmlParser yang bikin error kemarin
          # Perintah ini akan mencari di seluruh folder platforms
          find platforms/android -name "cordova.gradle" -exec sed -i 's/new XmlParser(false, false)/new XmlSlurper()/g' {} +
          
          # 3. JALANKAN BUILD LANGSUNG
          # Kita gunakan 'cordova build' karena dia otomatis memberi izin ke gradlew internalnya
          export JAVA_HOME=$JAVA_HOME_17_X64
          cordova build android --debug --device --no-telemetry
          
          # 4. Ambil hasil APK (pencarian fleksibel)
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/resizer-android13.apk \;

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

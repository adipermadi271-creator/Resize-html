name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Kita gunakan Node terbaru yang lebih stabil

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Buat proyek baru di folder 'build_app'
          cordova create build_app com.belajarkode.resizer ResizerApp
          
          # 2. Pindahkan file kamu ke dalam folder tersebut
          cp -r www/* build_app/www/
          cp config.xml build_app/config.xml
          
          # 3. Masuk dan Bangun (Gunakan satu baris perintah agar folder tetap sinkron)
          cd build_app && \
          cordova platform add android@12.0.0 --verbose && \
          export JAVA_HOME=$JAVA_HOME_17_X64 && \
          cordova build android --debug --device --verbose
          
          # 4. Ambil hasilnya
          mkdir -p ../output
          cp build_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk ../output/resizer-android13.apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

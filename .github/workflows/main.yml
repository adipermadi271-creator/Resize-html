name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Buat folder proyek
          cordova create my_app com.belajarkode.resizer ResizerApp
          
          # 2. Masukkan file kamu ke dalam folder proyek
          rm -rf my_app/www/*
          cp -r www/* my_app/www/
          cp config.xml my_app/config.xml
          
          # 3. Masuk ke folder proyek untuk semua perintah selanjutnya
          cd my_app
          
          # 4. Tambah platform (ini akan mengunduh template Android)
          cordova platform add android@12.0.0
          
          # 5. Jalankan prepare untuk membuat file gradlew
          cordova prepare android
          
          # 6. Beri izin eksekusi (jalur sekarang sudah benar)
          chmod +x platforms/android/gradlew

          # 7. Jalankan build
          export JAVA_HOME=$JAVA_HOME_11_X64
          cordova build android --debug --device
          
          # 8. Pindahkan hasil ke folder output di luar my_app
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../output/resizer-android13.apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Kita pakai 17 agar sdkmanager tidak error lagi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Tambahkan platform
          cordova platform add android@12.0.0
          
          # 2. Install Build Tools 33.0.2 menggunakan Java 17 (Pasti Berhasil)
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;33.0.2" "platforms;android-33"
          
          # 3. Kunci Gradle 7.6 (Agar terhindar dari error XmlParser)
          export CORDOVA_ANDROID_GRADLE_DISTRIBUTION_URL="https://services.gradle.org/distributions/gradle-7.6-bin.zip"
          
          # 4. Jalankan build
          # Kita pakai Java 17, tapi Gradle 7.6 masih sanggup menanganinya
          export JAVA_HOME=$JAVA_HOME_17_X64
          cordova build android --debug --device --no-telemetry -- --gradleArg=-Pandroid.useAndroidX=true
          
          # 5. Ambil hasil APK
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/resizer-android13.apk \;

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

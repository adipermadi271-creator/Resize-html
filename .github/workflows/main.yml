name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Buat folder proyek bersih
          cordova create my_app com.belajarkode.resizer ResizerApp
          
          # 2. Copy file pendukung
          rm -rf my_app/www/*
          cp -r www/* my_app/www/
          cp config.xml my_app/config.xml
          
          cd my_app
          
          # 3. Tambahkan platform Android 12
          cordova platform add android@12.0.0
          
          # 4. PERBAIKAN KRUSIAL: Beri izin eksekusi pada Gradlew
          if [ -f "platforms/android/gradlew" ]; then
            chmod +x platforms/android/gradlew
          fi

          # 5. Jalankan build dengan paksa menggunakan Java 11
          JAVA_HOME=$JAVA_HOME_11_X64 ./platforms/android/gradlew assembleDebug -p platforms/android
          
          # 6. Pindahkan hasil APK
          mkdir -p ../output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} ../output/resizer-android13.apk \;

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

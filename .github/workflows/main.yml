name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # Langkah ini sangat penting untuk memaksa versi Gradle yang kompatibel
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v3
        with:
          gradle-version: 7.6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Buat folder proyek baru agar bersih
          cordova create my_app com.belajarkode.resizer ResizerApp
          
          # 2. Masukkan file HTML dan Config kamu
          rm -rf my_app/www/*
          cp -r www/* my_app/www/
          cp config.xml my_app/config.xml
          
          cd my_app
          
          # 3. Tambahkan platform Android 12 (untuk mendukung HP Android 13 kamu)
          cordova platform add android@12.0.0
          
          # 4. Jalankan build dengan memaksa penggunaan JDK 11
          export JAVA_HOME=$JAVA_HOME_11_X64
          cordova build android --debug --device
          
          # 5. Siapkan output
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../output/resizer-android13.apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

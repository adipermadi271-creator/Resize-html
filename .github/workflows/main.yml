name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17' # Diubah ke 17 agar Gradle tidak protes

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Buat proyek
          cordova create my_app com.belajarkode.resizer ResizerApp
          
          # 2. Salin file kamu
          cp -r www/* my_app/www/
          cp config.xml my_app/config.xml
          
          # 3. Jalankan rangkaian perintah dalam satu blok folder my_app
          cd my_app && \
          cordova platform add android@12.0.0 && \
          cordova prepare android && \
          chmod +x platforms/android/gradlew && \
          export JAVA_HOME=$JAVA_HOME_17_X64 && \
          ./platforms/android/gradlew assembleDebug -p platforms/android && \
          cd .. && \
          mkdir -p output && \
          cp my_app/platforms/android/app/build/outputs/apk/debug/app-debug.apk output/resizer-android13.apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      # PERBAIKAN: Kita pasang Gradle versi 7.6 secara manual
      - name: Setup Gradle
        uses: gradle/gradle-build-action@v2
        with:
          gradle-version: 7.6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create build_dir com.kamu.resizer ResizerApp
          cp -r www/* build_dir/www/
          cp config.xml build_dir/config.xml
          cd build_dir
          # Kita gunakan versi android yang lebih stabil untuk Gradle 7
          cordova platform add android@10.1.2 

      - name: Build APK
        run: |
          cd build_dir
          # Kita tambahkan flag agar tidak mendownload gradle otomatis yang salah
          cordova build android --debug --device
        env:
          JAVA_HOME: ${{ env.JAVA_HOME_11_X64 }}

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-HTML
          path: build_dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk

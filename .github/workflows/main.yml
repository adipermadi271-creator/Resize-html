name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Hapus Gradle bawaan GitHub dari PATH agar tidak bentrok
          sudo rm -rf /usr/share/gradle*
          sudo rm -f /usr/bin/gradle
          
          # 2. Tambahkan platform
          cordova platform add android@12.0.0
          
          # 3. Buat Gradle Wrapper 7.6 secara paksa
          # Kita gunakan perintah 'gradle' dari wrapper, bukan dari sistem
          mkdir -p platforms/android/gradle/wrapper
          cat <<EOF > platforms/android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # 4. Ambil file gradlew dari template Cordova jika belum ada
          cordova prepare android
          
          # 5. Beri izin eksekusi pada gradlew
          chmod +x platforms/android/gradlew
          
          # 6. Jalankan build menggunakan gradlew (BUKAN perintah cordova build)
          # Ini memastikan kita pakai Gradle 7.6 yang kita download tadi
          export JAVA_HOME=$JAVA_HOME_11_X64
          cd platforms/android && ./gradlew assembleDebug
          
          # 7. Ambil hasil APK
          cd ../..
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/resizer-android13.apk \;

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. HAPUS GRADLE BAWAAN GITHUB agar tidak bentrok
          sudo rm -rf /usr/share/gradle*
          sudo rm -f /usr/bin/gradle
          
          # 2. Tambahkan platform
          cordova platform add android@12.0.0
          
          # 3. FIX XMLPARSER: Ubah XmlParser jadi XmlSlurper
          find platforms/android -name "cordova.gradle" -exec sed -i 's/new XmlParser(false, false)/new XmlSlurper()/g' {} +
          
          # 4. DOWNLOAD GRADLE 7.6 MANUAL
          wget https://services.gradle.org/distributions/gradle-7.6-bin.zip -P /tmp
          sudo unzip -d /opt/gradle /tmp/gradle-7.6-bin.zip
          export PATH=/opt/gradle/gradle-7.6/bin:$PATH
          
          # 5. Pasang Build Tools yang diperlukan
          echo "y" | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --install "build-tools;33.0.2" "platforms;android-33"
          
          # 6. Jalankan build menggunakan Java 17 dan Gradle 7.6 yang kita download
          export JAVA_HOME=$JAVA_HOME_17_X64
          cd platforms/android && /opt/gradle/gradle-7.6/bin/gradle assembleDebug
          
          # 7. Siapkan folder output
          cd ../..
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/resizer-android13.apk \;

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

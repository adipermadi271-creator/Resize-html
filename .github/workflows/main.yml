name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Buat folder proyek bersih
          cordova create my_app com.belajarkode.resizer ResizerApp
          
          # 2. Copy file pendukung
          rm -rf my_app/www/*
          cp -r www/* my_app/www/
          cp config.xml my_app/config.xml
          
          cd my_app
          
          # 3. Tambahkan platform Android 12
          cordova platform add android@12.0.0
          
          # 4. PERBAIKAN: Jalankan 'prepare' agar gradlew diciptakan oleh Cordova
          cordova prepare android
          
          # 5. Beri izin eksekusi pada Gradlew (lokasinya kita perkuat)
          chmod +x platforms/android/gradlew

          # 6. Jalankan build menggunakan perintah Cordova asli (lebih stabil untuk Android 12)
          # Kita gunakan 'export' agar Java 11 terbaca oleh Cordova
          export JAVA_HOME=$JAVA_HOME_11_X64
          cordova build android --debug --device
          
          # 7. Pindahkan hasil APK
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../output/resizer-android13.apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

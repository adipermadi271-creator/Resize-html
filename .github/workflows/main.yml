name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Tambahkan platform
          cordova platform add android@12.0.0
          
          # 2. OPERASI BEDAH: Perbaiki file cordova.gradle yang bikin error XmlParser
          # Kita ganti XmlParser menjadi XmlSlurper agar kompatibel dengan Gradle 9
          sed -i 's/new XmlParser(false, false).parseText(xml)/new XmlSlurper().parseText(xml)/g' platforms/android/CordovaLib/cordova.gradle
          
          # 3. Sinkronisasi folder
          cordova prepare android
          
          # 4. Beri izin eksekusi gradlew
          chmod +x platforms/android/gradlew
          
          # 5. Jalankan build menggunakan Java 17
          export JAVA_HOME=$JAVA_HOME_17_X64
          cd platforms/android && ./gradlew assembleDebug
          
          # 6. Ambil hasil APK
          cd ../..
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/resizer-android13.apk \;

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

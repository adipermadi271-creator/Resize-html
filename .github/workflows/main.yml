name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Bersihkan lingkungan dan tambahkan platform
          cordova platform add android@12.0.0
          
          # 2. Paksa pembuatan Gradle Wrapper 7.6 agar tidak error XmlParser
          # Kita buat foldernya dulu agar sistem tidak bingung
          mkdir -p platforms/android/gradle/wrapper
          cat <<EOF > platforms/android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # 3. Jalankan build langsung (Cordova akan mengurus segalanya)
          # Kita tidak menggunakan chmod lagi agar tidak error "No such file"
          export JAVA_HOME=$JAVA_HOME_11_X64
          cordova build android --debug --device --no-telemetry
          
          # 4. Ambil hasil APK dengan pencarian dinamis
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/resizer-android13.apk \;

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

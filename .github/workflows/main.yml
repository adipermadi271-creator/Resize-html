name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Prepare and Build Cordova
        run: |
          # 1. Buat proyek di folder sementara
          cordova create my_app com.kamu.resizer ResizerApp
          
          # 2. Hapus isi folder 'www' bawaan cordova, ganti dengan milikmu
          rm -rf my_app/www/*
          cp -r www/* my_app/www/
          
          # 3. Copy config.xml ke dalam folder proyek
          cp config.xml my_app/config.xml
          
          # 4. Masuk ke folder proyek dan tambah platform
          cd my_app
          cordova platform add android@10.1.2
          
          # 5. Jalankan Build
          cordova build android --debug --device
          
          # 6. Pindahkan hasil APK ke folder luar agar mudah di-upload
          mkdir -p ../output
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk ../output/resizer-pro.apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-HTML
          path: output/resizer-pro.apk

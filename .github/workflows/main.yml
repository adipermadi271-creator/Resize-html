name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4 # Update ke v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4 # Update ke v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4 # Update ke v4
        with:
          node-version: '18' # Menggunakan Node yang lebih stabil

      - name: Install Cordova
        run: npm install -g cordova

      - name: Create Cordova Project
        run: |
          cordova create build_dir com.kamu.resizer ResizerApp
          cp -r www/* build_dir/www/
          cp config.xml build_dir/config.xml
          cd build_dir
          cordova platform add android@11.0.0

      - name: Build APK
        run: |
          cd build_dir
          cordova build android --debug

      - name: Upload APK Result
        uses: actions/upload-artifact@v4 # INI PERBAIKAN UTAMANYA (Update ke v4)
        with:
          name: Aplikasi-Resizer-HTML
          path: build_dir/platforms/android/app/build/outputs/apk/debug/app-debug.apk

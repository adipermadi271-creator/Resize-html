name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 17)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Inisialisasi Cordova langsung di folder utama
          # Kita gunakan --copy-from karena folder www sudah ada
          cordova telemetry off
          cordova platform add android@12.0.0
          
          # 2. Jalankan prepare untuk membuat file gradlew
          cordova prepare android
          
          # 3. Beri izin eksekusi pada gradlew (pasti ketemu karena di root)
          chmod +x platforms/android/gradlew
          
          # 4. Jalankan build menggunakan Java 17
          export JAVA_HOME=$JAVA_HOME_17_X64
          ./platforms/android/gradlew assembleDebug -p platforms/android
          
          # 5. Pindahkan hasil ke folder output
          mkdir -p output
          cp platforms/android/app/build/outputs/apk/debug/app-debug.apk output/resizer-android13.apk

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk

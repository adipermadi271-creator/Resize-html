name: Build Cordova APK
on: [push, workflow_dispatch]

jobs:
  android-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Java (JDK 11)
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Cordova
        run: npm install -g cordova

      - name: Build Android APK
        run: |
          # 1. Tambahkan platform
          cordova platform add android@12.0.0
          
          # 2. Paksa sinkronisasi folder (Kunci agar gradlew muncul)
          cordova prepare android
          sleep 5
          
          # 3. Cari file gradlew secara paksa dan beri izin eksekusi
          # Perintah ini akan mencari file gradlew di folder mana pun dan melakukan chmod
          find platforms/android/ -name "gradlew" -exec chmod +x {} +
          
          # 4. Buat manual Gradle Wrapper 7.6 (Mencegah error XmlParser nanti)
          mkdir -p platforms/android/gradle/wrapper
          cat <<EOF > platforms/android/gradle/wrapper/gradle-wrapper.properties
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-7.6-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF
          
          # 5. Jalankan build menggunakan Java 11
          export JAVA_HOME=$JAVA_HOME_11_X64
          cordova build android --debug --device --no-telemetry
          
          # 6. Ambil hasil APK
          mkdir -p output
          find platforms/android/app/build/outputs/apk/debug/ -name "*.apk" -exec cp {} output/resizer-android13.apk \;

      - name: Upload APK Result
        uses: actions/upload-artifact@v4
        with:
          name: Aplikasi-Resizer-Android13
          path: output/resizer-android13.apk
